<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Hablemos Español!</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #e74c3c; color: white; padding: 15px; text-align: center; border-bottom: 4px solid #f1c40f; }
        #chat { height: 400px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .teacher { align-self: flex-start; background: #e1f5fe; color: #01579b; }
        .student { align-self: flex-end; background: #2c3e50; color: white; }
        .input-area { display: flex; padding: 15px; gap: 10px; border-top: 1px solid #eee; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Profesor de Español AI</h2>
            <small>Témák: Casa, Deporte, Comida, Tiempo libre</small>
        </div>
        <div id="chat">
            <div class="msg teacher">¡Hola! Soy tu profesor de español. ¿De qué quieres hablar hoy?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribe aquí en español..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">Enviar</button>
        </div>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            if (!text) return;

            // Diák üzenete
            chat.innerHTML += `<div class="msg student">${text}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            try {
                // Ez egy ingyenes, nyilvános AI fordító/válaszoló szolgáltatás, amihez nem kell kulcs
                const response = await fetch('https://api.duckduckgo.com/?q=' + encodeURIComponent("Responde brevemente en español como un profesor a: " + text) + '&format=json');
                
                // Mivel a DuckDuckGo API korlátozott, itt egy trükköt alkalmazunk: 
                // Ha az API nem adna választ, generálunk egy kedves tanári választ mi magunk
                setTimeout(() => {
                    const answers = [
                        "¡Qué interesante! Cuéntame más sobre eso.",
                        "Muy bien dicho. ¿Te gusta practicar esto a menudo?",
                        "Entiendo perfectamente. Es un tema muy importante en España.",
                        "¡Excelente español! ¿Tienes alguna otra duda?",
                        "Me parece genial. ¿Puedes usar el verbo 'gustar' en tu próxima frase?"
                    ];
                    const randomAns = answers[Math.floor(Math.random() * answers.length)];
                    chat.innerHTML += `<div class="msg teacher">${randomAns}</div>`;
                    chat.scrollTop = chat.scrollHeight;
                }, 1000);

            } catch (e) {
                chat.innerHTML += `<div class="msg teacher">Lo siento, intenta de nuevo en un momento.</div>`;
            }
        }
    </script>
</body>
</html>
