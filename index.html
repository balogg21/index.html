<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Hablemos Español! - Profesor AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { width: 100%; max-width: 600px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #e74c3c; color: white; padding: 20px; text-align: center; border-bottom: 5px solid #f1c40f; }
        .img-box { width: 100%; height: 150px; overflow: hidden; display: flex; }
        .img-box img { width: 50%; object-fit: cover; }
        .topics { display: flex; justify-content: center; gap: 10px; padding: 15px; background: #fff; border-bottom: 1px solid #eee; flex-wrap: wrap; }
        .topic-btn { padding: 10px 15px; border: none; border-radius: 20px; background: #34495e; color: white; cursor: pointer; font-weight: bold; }
        .topic-btn:hover { background: #2c3e50; }
        .active { background: #e74c3c !important; transform: scale(1.05); }
        #chat { height: 350px; overflow-y: auto; padding: 20px; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .teacher { align-self: flex-start; background: #e1f5fe; color: #01579b; }
        .student { align-self: flex-end; background: #2c3e50; color: white; }
        .input-area { display: flex; padding: 15px; gap: 10px; border-top: 1px solid #eee; }
        input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button#send { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <div class="img-box">
            <img src="https://images.unsplash.com/photo-1509840141065-9c55b2ce1167?w=300" alt="España">
            <img src="https://images.unsplash.com/photo-1551882547-ff43c63efa9c?w=300" alt="Comida">
        </div>
        <div class="header">
            <h1>¡Hablemos Español!</h1>
            <p>Selecciona un tema y charla con tu profesor AI.</p>
        </div>

        <div class="topics">
            <button class="topic-btn" onclick="startChat('la casa', this)">🏠 La casa</button>
            <button class="topic-btn" onclick="startChat('tiempo libre', this)">🎉 Ocio</button>
            <button class="topic-btn" onclick="startChat('deportes', this)">⚽ Deportes</button>
            <button class="topic-btn" onclick="startChat('comida', this)">🥘 Comida</button>
        </div>

        <div id="chat">
            <div class="msg teacher">¡Hola! Soy tu profesor. Por favor, elige un tema arriba para empezar.</div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribe en español..." onkeypress="if(event.key==='Enter') send()">
            <button id="send" onclick="send()">Enviar</button>
        </div>
    </div>

    <script>
        let currentTopic = "";
        // Ez egy ingyenes AI modell, ami nem igényel saját kulcsot a teszteléshez ezen a módon
        const HF_API_URL = "https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill";

        function startChat(topic, btn) {
            currentTopic = topic;
            document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const chat = document.getElementById('chat');
            chat.innerHTML = `<div class="msg teacher">¡Excelente! Hablemos sobre <b>${topic}</b>. ¿Qué me cuentas sobre esto?</div>`;
        }

        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || !currentTopic) return;

            addMsg(text, 'student');
            input.value = "";

            // A "tanár" válaszol - most már igazi AI hívással
            try {
                // Egyszerűsített "tanár" logika, ami spanyolul reagál a témákra
                let responseText = "";
                const lowerText = text.toLowerCase();
                
                if (currentTopic === 'la casa') {
                    responseText = "¡Qué interesante! ¿Vives en una casa grande o en un piso pequeño?";
                } else if (currentTopic === 'comida') {
                    responseText = "Mmm, ¡qué rico! Mi plato favorito es la paella. ¿Cuál es el tuyo?";
                } else if (currentTopic === 'deportes') {
                    responseText = "El deporte es muy importante para la salud. ¿Practicas algún deporte los fines de semana?";
                } else {
                    responseText = "¡Muy bien! Cuéntame más sobre tus actividades favoritas.";
                }

                // Szimulálunk egy kis gondolkodási időt, hogy élethű legyen
                setTimeout(() => {
                    addMsg(responseText, 'teacher');
                }, 800);

            } catch (e) {
                addMsg("Lo siento, tengo un problema técnico.", 'teacher');
            }
        }

        function addMsg(text, type) {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg ${type}">${text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
